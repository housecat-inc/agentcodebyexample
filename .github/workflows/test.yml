name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Allow chromium's sandbox to start under Ubuntu 24.04's AppArmor policy.
      - run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - run: go generate ./...
      - run: go test ./...
